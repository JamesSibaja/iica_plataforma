{% extends "generica.html" %}
{% load static %}
{% block content %}

<style>
    :root {
        --iica-azul: #00589C;
        --iica-azul-claro: #4FA3D1;
        --gris-fondo: #F4F4F4;
    }

    .login-container {
        min-height: calc(100vh - 180px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--gris-fondo);
        padding: 40px 15px;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        overflow: hidden;
        background: white;
    }

    .login-header {
        background: var(--iica-azul);
        color: white;
        text-align: center;
        padding: 25px 20px;
    }

    .login-header img {
        max-height: 55px;
        margin-bottom: 10px;
    }

    .login-body {
        padding: 30px;
    }

    .login-body button {
        width: 100%;
    }

    .login-footer {
        text-align: center;
        padding: 20px;
        background: #fafafa;
        border-top: 1px solid #eee;
    }
</style>

<div class="franja_baja4"></div>

<div class="login-container">

    <div class="login-card">

        <!-- HEADER -->
        <div class="login-header">
            <h5 class="fw-bold mb-0">Ingreso a la plataforma</h5>
        </div>

        <!-- BODY -->
        <div class="login-body">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Entrar
                    </button>
                </div>
            </form>
        </div>

        <!-- FOOTER -->
        <div class="login-footer">
            <p class="mb-2 text-muted">¿No tienes una cuenta?</p>
            <button class="btn btn-outline-success"
                    onclick="location.href='{% url 'SignUp' %}'">
                Crear cuenta
            </button>
        </div>

    </div>

</div>

{% endblock %}

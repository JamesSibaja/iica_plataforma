{% extends "generica.html" %}
{% load static %}
{% block content %}

<style>
    :root {
        --iica-azul: #00589C;
        --iica-verde: #6EBE44;
        --gris-fondo: #F4F4F4;
    }

    .password-container {
        min-height: calc(100vh - 180px);
        background: var(--gris-fondo);
        padding: 40px 15px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .password-card {
        width: 100%;
        max-width: 550px;
        background: white;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        overflow: hidden;
    }

    .password-header {
        background: var(--iica-azul);
        color: white;
        padding: 25px;
        text-align: center;
    }

    .password-body {
        padding: 30px;
    }

    .password-body input {
        margin-bottom: 15px;
    }

    .password-info {
        font-size: 0.9rem;
        color: #6c757d;
        margin-bottom: 20px;
        text-align: center;
    }

    .password-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 25px;
        flex-wrap: wrap;
    }
</style>

<div class="franja_baja4"></div>

<div class="password-container">

    <div class="password-card">

        <!-- HEADER -->
        <div class="password-header">
            <h4 class="fw-bold mb-1">Cambiar contraseña</h4>
            <small>{{ request.user.username }}</small>
        </div>

        <!-- BODY -->
        <div class="password-body">

            <p class="password-info">
                Por seguridad, utiliza una contraseña fuerte y no la compartas con nadie.
            </p>

            <form method="post">
                {% csrf_token %}

                {{ password_form.as_p }}

                <div class="password-actions">
                    <button type="submit" class="btn btn-success btn-lg">
                        Guardar cambios
                    </button>

                    <a href="{% url 'Inicio' %}" class="btn btn-outline-danger btn-lg">
                        Cancelar
                    </a>
                </div>
            </form>

        </div>

    </div>

</div>

{% endblock %}

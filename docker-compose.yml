services:

  db_vm:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: iica_plataforma_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - mynetwork_vm

  redis_vm:
    image: redis:7
    restart: unless-stopped
    networks:
      - mynetwork_vm

  gunicorn_vm:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.gunicorn
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
      - ./scripts:/app/scripts
    expose:
      - "8765"
    depends_on:
      - db_vm
      - redis_vm
    networks:
      - mynetwork_vm

  daphne_vm:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.daphne
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
    expose:
      - "8089"
    networks:
      - mynetwork_vm

  celery_vm:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.celery
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
    networks:
      - mynetwork_vm

  nginx_vm:
    image: nginx:1.25
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
      - ./iica_plataforma:/app
    depends_on:
      - gunicorn_vm
      - daphne_vm
    networks:
      - mynetwork_vm

networks:
  mynetwork_vm:
    driver: bridge

volumes:
  db_data:
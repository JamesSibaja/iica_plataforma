version: "3.9"

services:

  db_vm:
    image: postgres:15
    environment:
      POSTGRES_DB: iica_plataforma_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: iicaPlat
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mynetwork_vm

  redis_vm:
    image: redis:7
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mynetwork_vm

  gunicorn_vm:
    build:
      context: .
      dockerfile: Dockerfile.gunicorn
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
      - ./scripts:/app/scripts
    expose:
      - "8765"
    depends_on:
      db_vm:
        condition: service_healthy
      redis_vm:
        condition: service_healthy
    networks:
      - mynetwork_vm

  daphne_vm:
    build:
      context: .
      dockerfile: Dockerfile.daphne
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
    expose:
      - "8089"
    depends_on:
      gunicorn_vm:
        condition: service_started
      redis_vm:
        condition: service_healthy
    networks:
      - mynetwork_vm

  celery_vm:
    build:
      context: .
      dockerfile: Dockerfile.celery
      args:
        MODE: ${MODE:-development}
    volumes:
      - ./iica_plataforma:/app
    depends_on:
      redis_vm:
        condition: service_healthy
      gunicorn_vm:
        condition: service_started
    env_file:
      - .env
    networks:
      - mynetwork_vm

  nginx_vm:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
      - ./iica_plataforma:/app
      - /etc/ssl/certs/dhparam.pem:/etc/ssl/certs/dhparam.pem
    depends_on:
      - gunicorn_vm
      - daphne_vm
    networks:
      - mynetwork_vm

  acme:
    image: neilpang/acme.sh
    volumes:
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
      - ./letsencrypt/acme.sh:/acme.sh
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        sleep 12h & wait \$!;
        /acme.sh/acme.sh --cron;
      done
      "
    networks:
      - mynetwork_vm

networks:
  mynetwork_vm:
    driver: bridge

volumes:
  db_data: